name: Actualizador Automatico

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          pip install requests
          npm install puppeteer

      - name: Run Python script
        run: python actualizar_lista.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Bot Mira TV"
          git config --global user.email "bot@mira-tv-gratis.com"
          # Agregamos tanto el JSON como la lista m3u
          git add canales.json lista.m3u
          git commit -m "Actualizacion automatica de enlaces" || echo "No hay cambios para commitear"
          git push
